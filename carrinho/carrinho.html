<section id="carrinho" class="carrinho-cadastro">
  <img src="img/logo.png" alt="AuMigo" class="logo-carrinho">
  <link rel="stylesheet" href="style.css">

  <h2>Meu Carrinho 🐾</h2>
  <p class="subtitulo-carrinho">Confira seus produtos antes de finalizar</p>

  <div id="listaCarrinho">
    <p class="carrinho-vazio">Seu carrinho está vazio 🐶</p>
  </div>

  <div class="total-carrinho">
    <span>Total da compra:</span>
    <strong>R$ <span id="totalCarrinho">0,00</span></strong>
  </div>

  <div class="pagamento-carrinho">
    <h3>Forma de pagamento</h3>

    <label>
      <input type="radio" name="formaPagamento" value="Pix" onclick="mostrarPagamento()">
      Pix
    </label>

    <label>
      <input type="radio" name="formaPagamento" value="Débito" onclick="mostrarPagamento()">
      Cartão de Débito
    </label>

    <label>
      <input type="radio" name="formaPagamento" value="Crédito" onclick="mostrarPagamento()">
      Cartão de Crédito
    </label>
  </div>

  <div id="pixBox" class="box-pagamento">
    <p>Chave Pix:</p>
    <strong>aumigo@pet.com</strong>
  </div>

  <div id="cartaoBox" class="box-pagamento">
    <input type="text" placeholder="Nome impresso no cartão">
    <input type="text" placeholder="Número do cartão">

    <div class="linha-cartao">
      <input type="text" placeholder="Validade">
      <input type="text" placeholder="CVC">
    </div>
  </div>

  <button class="btn-finalizar" onclick="finalizarCompra()">
    Finalizar compra
  </button>
</section>
